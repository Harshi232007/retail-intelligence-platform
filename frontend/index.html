<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Intelligence Platform</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>

<h1>Retail Intelligence Platform</h1>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Sales</h2>
<p id="sales">$0</p>
</div>

<div class="card">
<h2>Total Profit</h2>
<p id="profit">$0</p>
</div>

<div class="card">
<h2>Total Orders</h2>
<p id="orders">0</p>
</div>

</div>

<div class="charts">

    <div class="chart-box">
        <h2>Sales by Category</h2>
        <canvas id="salesChart"></canvas>
    </div>

    <div class="chart-box">
        <h2>Profit by Category</h2>
        <canvas id="profitChart"></canvas>
    </div>

</div>

<div class="table-box">

<h2>Top Products</h2>
<input
type="text"
id="searchProduct"
placeholder="Search Product..."
style="width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;">


<table>

<thead>

<tr>
<th>Product</th>
<th>Sales</th>
</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>

</div>

<script src="js/script.js"></script>

</body>

</html>
